services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Service Discovery: Keeps track of all microservices
  eureka-server:
    build: # Instructions for building a custom image from a local directory
      context: ./EurekaService # The directory containing the build files
      dockerfile: Dockerfile  # The specific file used to build the image
    image: eureka-server:latest # The name and tag given to the resulting image
    ports: # Maps host machine ports to container ports (HOST:CONTAINER)
      - "8761:8761"
    healthcheck: # A test to check if the container is running correctly
      # test: The actual command executed to verify the container's health
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 20s # How often to run the check
      timeout: 10s # How long to wait for a response
      retries: 5 # Number of failures before marking as unhealthy

  gateway-api:
    build:
      context: ./GatewayService
      dockerfile: Dockerfile
    image: gateway-api:latest
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
    ports:
      - "9003:9000"

  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086" 
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_ADMIN_USER:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD:-adminpassword}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG:-nais}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET:-project-analytics}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN:-dev-analytics-token-change-me}
    volumes:
      - influxdb_data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  project-realization-analytics-service:
    build:
      context: ./ProjectRealizationAnalyticsService
      dockerfile: Dockerfile
    image: project-realization-analytics-service:latest
    depends_on:
      eureka-server:
        condition: service_healthy
      influxdb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUXDB_TOKEN:-dev-analytics-token-change-me}
      INFLUX_ORG: ${INFLUXDB_ORG:-nais}
      INFLUX_BUCKET: ${INFLUXDB_BUCKET:-project-analytics}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_PORT: 8080
    ports:
      - "9063:8080"

  document-acsses-service:
    build:
      context: ./DocumentAnalyticsService
      dockerfile: Dockerfile
    image: timeseries-database-service:latest
    container_name: timeseries-database-service
    depends_on:
      eureka-server:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUXDB_TOKEN:-dev-analytics-token-change-me}
      INFLUX_ORG: ${INFLUXDB_ORG:-nais}
      INFLUX_BUCKET: document_management
      SERVER_PORT: 8082
    ports:
      - "8082:8082"

  project-realization-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: project_realization
      POSTGRES_USER: project_realization
      POSTGRES_PASSWORD: project_realization
    ports:
      - "5433:5432"
    volumes:
      - project_realization_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U project_realization -d project_realization"]
      interval: 10s
      timeout: 5s
      retries: 5

  project-realization-pgadmin:
    image: dpage/pgadmin4:latest
    depends_on:
      project-realization-postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - project_realization_pgadmin_data:/var/lib/pgadmin

  project-realization-service:
    build:
      context: ./ProjectRealizationService
      dockerfile: Dockerfile
    image: project-realization-service:latest
    depends_on:
      eureka-server:
        condition: service_healthy
      project-realization-postgres:
        condition: service_healthy
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://project-realization-postgres:5432/project_realization
      SPRING_DATASOURCE_USERNAME: project_realization
      SPRING_DATASOURCE_PASSWORD: project_realization
      JWT_SECRET: c3Rha2Vob2xkZXJzZXJ2aWNland0c2VjcmV0a2V5Zm9ydGgyNTZiaXRzMTIzNDU2Nzg5MA==
      AI_SERVICE_MODE: mock
      SPRING_AUTOCONFIGURE_EXCLUDE: org.springframework.ai.autoconfigure.ollama.OllamaAutoConfiguration
    ports:
      - "9060:8080"

  grafana:
    image: grafana/grafana:11.0.0
    container_name: grafana
    depends_on:
      influxdb:
        condition: service_healthy
      project-realization-postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_CSRF_TRUSTED_ORIGINS: http://localhost:5173
      GF_USERS_DEFAULT_THEME: dark
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/dashboards

  stakeholder-service:
    build:
      context: ./StakeholderService
      dockerfile: Dockerfile
    image: stakeholder-service:latest
    depends_on:
      eureka-server:
        condition: service_healthy
      stakeholder-postgres:
        condition: service_healthy
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://stakeholder-postgres:5432/stakeholders
      SPRING_DATASOURCE_USERNAME: stakeholder
      SPRING_DATASOURCE_PASSWORD: stakeholder
      JWT_SECRET: c3Rha2Vob2xkZXJzZXJ2aWNland0c2VjcmV0a2V5Zm9ydGgyNTZiaXRzMTIzNDU2Nzg5MA==
    ports:
      - "9062:8082"

  prompt-vector-service:
    build:
      context: ./PromptVectorService
      dockerfile: Dockerfile
    image: vector-service:latest
    depends_on:
      eureka-server:
        condition: service_healthy
      standalone:
        condition: service_healthy
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      MILVUS_HOST: standalone
      MILVUS_PORT: 19530
      PROMPT_VECTOR_SEED_ENABLED: "false"
    ports:
      - "9061:8080"

  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.25
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: milvus-minio
    image: minio/minio:latest
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      # - "9001:9001"  # MinIO console UI (not required for local dev)
      - "9000:9000"
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.6.13
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
    depends_on:
      - etcd
      - minio

  # attu:  # Milvus UI — optional, disabled for lighter local stack
  #   image: zilliz/attu:v2.4
  #   container_name: attu
  #   environment:
  #     MILVUS_URL: standalone:19530
  #   ports:
  #     - "8090:3000"
  #   depends_on:
  #     - standalone

  vector-database-service:
    build:
      context: ./VectorDatabaseService
      dockerfile: Dockerfile
    image: vector-database-service:latest
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      MILVUS_HOST: standalone
      MILVUS_PORT: 19530
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8000:8000"
    depends_on:
      eureka-server:
        condition: service_healthy
      standalone:
        condition: service_healthy

  document-management-service:
    build:
      context: ./DocumentManagementService
      dockerfile: Dockerfile
    image: document-management-service:latest
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://document-postgres:5432/documents
      SPRING_DATASOURCE_USERNAME: document
      SPRING_DATASOURCE_PASSWORD: document
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "9070:8080"
    depends_on:
      eureka-server:
        condition: service_healthy
      document-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  document-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: documents
      POSTGRES_USER: document
      POSTGRES_PASSWORD: document
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5434:5432"
    volumes:
      - document_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U document -d documents"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.22.0
    ports:
      # - "7474:7474"  # Neo4j Browser UI (not required for services)
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  stakeholder-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: stakeholders
      POSTGRES_USER: stakeholder
      POSTGRES_PASSWORD: stakeholder
    ports:
      - "5432:5432"
    volumes:
      - stakeholder_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stakeholder -d stakeholders"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============= ELASTICSEARCH SERVICE =============
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: elasticsearch
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      xpack.security.enabled: "false"
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200 | grep -q cluster_name"]
      interval: 20s
      timeout: 10s
      retries: 5
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  elasticsearch-service:
    build:
      context: ./ElasticsearchService
      dockerfile: Dockerfile
    image: elasticsearch-service:latest
    depends_on:
      eureka-server:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      SPRING_ELASTICSEARCH_REST_URIS: http://elasticsearch:9200
      SERVER_PORT: 8080
    ports:
      - "9064:8080"

  # ============= CASSANDRA SERVICE =============

  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    environment:
      CASSANDRA_CLUSTER_NAME: "PromptAnalyticsCluster"
      CASSANDRA_LISTEN_ADDRESS: cassandra
      CASSANDRA_BROADCAST_ADDRESS: cassandra
      CASSANDRA_RPC_ADDRESS: cassandra
      CASSANDRA_SEEDS: cassandra
    ports:
      - "9042:9042"
      - "7000:7000"
    healthcheck:
      test: ["CMD", "nodetool", "status"]
      interval: 30s
      timeout: 20s
      retries: 3
    volumes:
      - cassandra_data:/var/lib/cassandra

  cassandra-service:
    build:
      context: ./CassandraService
      dockerfile: Dockerfile
    image: cassandra-service:latest
    depends_on:
      eureka-server:
        condition: service_healthy
      cassandra:
        condition: service_healthy
      redis:                   
        condition: service_healthy
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      SPRING_CASSANDRA_CONTACTPOINTS: cassandra:9042
      SPRING_CASSANDRA_KEYSPACENAME: prompt_analytics
      SPRING_CASSANDRA_LOCAL_DATACENTER: datacenter1
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_PORT: 8080
    ports:
      - "9065:8080"

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  stakeholder_pg_data: {}
  document_pg_data: {}
  project_pg_data: {}
  project_realization_pg_data: {}
  project_realization_pgadmin_data: {}
  etcd_data: {}
  minio_data: {}
  neo4j_data: {}
  influxdb_data: {}
  elasticsearch_data: {}
  cassandra_data: {}
  redis_data: {}
  grafana_data: {}
  ollama_data: {}
