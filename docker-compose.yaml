version: "3.3" # Defines the Docker Compose file format version

services:
  # Service Discovery: Keeps track of all microservices
  eureka-server:
    build: # Instructions for building a custom image from a local directory
      context: ./EurekaService # The directory containing the build files
      dockerfile: Dockerfile  # The specific file used to build the image
    image: eureka-server:latest # The name and tag given to the resulting image
    ports: # Maps host machine ports to container ports (HOST:CONTAINER)
      - "8761:8761"
    healthcheck: # A test to check if the container is running correctly
      # test: The actual command executed to verify the container's health
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 20s # How often to run the check
      timeout: 10s # How long to wait for a response
      retries: 5 # Number of failures before marking as unhealthy

  gateway-api:
    build:
      context: ./GatewayService
      dockerfile: Dockerfile
    image: gateway-api:latest
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
    ports:
      - "9003:9000"


  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086" 
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUXDB_ADMIN_USER:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD:-adminpassword}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUXDB_ORG:-nais}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUXDB_BUCKET:-project-analytics}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN:-dev-analytics-token-change-me}
    volumes:
      - influxdb_data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  project-realization-analytics-service:
    build:
      context: ./ProjectRealizationAnalyticsService
      dockerfile: Dockerfile
    image: project-realization-analytics-service:latest
    depends_on:
      eureka-server:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      INFLUX_URL: http://influxdb:8086
      INFLUX_TOKEN: ${INFLUXDB_TOKEN:-dev-analytics-token-change-me}
      INFLUX_ORG: ${INFLUXDB_ORG:-nais}
      INFLUX_BUCKET: ${INFLUXDB_BUCKET:-project-analytics}
      INFLUX_SEED_ENABLED: ${INFLUX_SEED_ENABLED:-true}
      INFLUX_SEED_MIN_RECORDS: ${INFLUX_SEED_MIN_RECORDS:-5000}
      SERVER_PORT: 8080
    ports:
      - "9063:8080"

  project-realization-service:
    build:
      context: ./ProjectRealizationService
      dockerfile: Dockerfile
    image: project-realization-service:latest
    depends_on:
      eureka-server:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      SPRING_NEO4J_URI: bolt://neo4j:7687
      SPRING_NEO4J_AUTHENTICATION_USERNAME: neo4j
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: password
      JWT_SECRET: c3Rha2Vob2xkZXJzZXJ2aWNland0c2VjcmV0a2V5Zm9ydGgyNTZiaXRzMTIzNDU2Nzg5MA==
    ports:
      - "9060:8080"

  stakeholder-service:
    build:
      context: ./StakeholderService
      dockerfile: Dockerfile
    image: stakeholder-service:latest
    depends_on:
      eureka-server:
        condition: service_healthy
      stakeholder-postgres:
        condition: service_healthy
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      SPRING_DATASOURCE_URL: jdbc:postgresql://stakeholder-postgres:5432/stakeholders
      SPRING_DATASOURCE_USERNAME: stakeholder
      SPRING_DATASOURCE_PASSWORD: stakeholder
      JWT_SECRET: c3Rha2Vob2xkZXJzZXJ2aWNland0c2VjcmV0a2V5Zm9ydGgyNTZiaXRzMTIzNDU2Nzg5MA==
    ports:
      - "9062:8082"

  prompt-vector-service:
    build:
      context: ./PromptVectorService
      dockerfile: Dockerfile
    image: vector-service:latest
    depends_on:
      eureka-server:
        condition: service_healthy
      standalone:
        condition: service_healthy
    environment:
      EUREKA_URL: http://eureka-server:8761/eureka/
      MILVUS_HOST: standalone
      MILVUS_PORT: 19530
    ports:
      - "9061:8080"

  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.25
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    volumes:
      - ./VectorDatabaseService/volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: milvus-minio
    image: minio/minio:latest
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      # - "9001:9001"  # MinIO console UI (not required for local dev)
      - "9000:9000"
    volumes:
      - ./VectorDatabaseService/volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.6.13
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
    depends_on:
      - etcd
      - minio

  # attu:  # Milvus UI — optional, disabled for lighter local stack
  #   image: zilliz/attu:v2.4
  #   container_name: attu
  #   environment:
  #     MILVUS_URL: standalone:19530
  #   ports:
  #     - "8090:3000"
  #   depends_on:
  #     - standalone

  doucument-management-service:
    build:
      context: ./VectorDatabaseService
      dockerfile: Dockerfile
    image: doucument-management-service:latest
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      MILVUS_HOST: standalone
      MILVUS_PORT: 19530
    ports:
      - "8000:8000"
    depends_on:
      eureka-server:
        condition: service_healthy
      standalone:
        condition: service_healthy

  neo4j:
    image: neo4j:5
    ports:
      # - "7474:7474"  # Neo4j Browser UI (not required for services)
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/password
    volumes: # Mounts persistent storage or local folders into the container
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  stakeholder-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: stakeholders
      POSTGRES_USER: stakeholder
      POSTGRES_PASSWORD: stakeholder
    ports:
      - "5432:5432"
    volumes:
      - stakeholder_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stakeholder -d stakeholders"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  neo4j_data: {}
  stakeholder_pg_data: {}
  influxdb_data: {}


