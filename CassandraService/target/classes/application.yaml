spring:
  application:
    name: cassandra-service
  cassandra:
    contact-points: cassandra:9042
    keyspace-name: prompt_analytics
    local-datacenter: datacenter1

server:
  port: 8080
  servlet:
    context-path: /api

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
