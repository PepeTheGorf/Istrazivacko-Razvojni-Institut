server:
  port: 8080 # Unutar kontejnera je 8080, Docker ga mapira na 9061

spring:
  application:
    name: prompt-vector-service

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

milvus:
  host: ${MILVUS_HOST:localhost}
  port: ${MILVUS_PORT:19530}

# LangChain4j local embedding model - runs entirely on CPU, no external API needed
logging:
  level:
    root: INFO
