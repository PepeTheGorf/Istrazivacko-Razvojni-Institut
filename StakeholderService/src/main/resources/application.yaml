server:
  port: 8082

spring:
  application:
    name: stakeholder-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/stakeholders}
    username: ${SPRING_DATASOURCE_USERNAME:stakeholder}
    password: ${SPRING_DATASOURCE_PASSWORD:stakeholder}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET:c3Rha2Vob2xkZXJzZXJ2aWNland0c2VjcmV0a2V5Zm9ydGgyNTZiaXRzMTIzNDU2Nzg5MA==}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
      healthcheck:
        enabled: true
  instance:
    prefer-ip-address: true
