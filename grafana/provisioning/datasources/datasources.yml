apiVersion: 1

datasources:
  - name: InfluxDB
    type: influxdb
    uid: influxdb
    access: proxy
    url: http://influxdb:8086
    isDefault: true
    jsonData:
      version: Flux
      organization: nais
      defaultBucket: project-analytics
      tlsSkipVerify: true
    secureJsonData:
      token: dev-analytics-token-change-me
