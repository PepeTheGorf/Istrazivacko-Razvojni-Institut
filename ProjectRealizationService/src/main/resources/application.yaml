server:
  port: 8080

spring:
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:tvoj_kljuc_ovde}
      chat:
        options:
          model: gpt-3.5-turbo
  cache:
    type: redis
  neo4j:
    uri: ${SPRING_NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${SPRING_NEO4J_AUTHENTICATION_USERNAME:neo4j}
      password: ${SPRING_NEO4J_AUTHENTICATION_PASSWORD:password}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/project_realization}
    username: ${SPRING_DATASOURCE_USERNAME:project_realization}
    password: ${SPRING_DATASOURCE_PASSWORD:project_realization}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  application:
    name: project-realization-service
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.neo4j.Neo4jReactiveDataAutoConfiguration
      - org.springframework.boot.autoconfigure.data.neo4j.Neo4jReactiveRepositoriesAutoConfiguration

redis:
  host: ${REDIS_HOST:localhost}
  port: ${REDIS_PORT:6379}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
      healthcheck:
        enabled: true
  instance:
    prefer-ip-address: true
    
jwt:
  secret: ${JWT_SECRET:c3Rha2Vob2xkZXJzZXJ2aWNland0c2VjcmV0a2V5Zm9ydGgyNTZiaXRzMTIzNDU2Nzg5MA==}




